<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pathfinder</title>
    <link rel="stylesheet" href="sidepanel.css" />
    <link rel="stylesheet" href="profile/profile.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">Pathfinder</h1>
      <span class="version">v0.1.0</span>
    </header>

    <section class="card">
      <h2 class="card__title">Current page</h2>
      <div id="detection" class="detection">
        <span class="badge badge--neutral">Checking…</span>
      </div>
      <a id="page-url" class="page-url" href="#" target="_blank" rel="noopener"></a>
      <dl id="signals" class="signals" hidden></dl>
    </section>

    <section class="card">
      <div class="card__head">
        <h2 class="card__title">Scraped text (JSON)</h2>
        <button id="copy-json" class="btn-link" hidden>Copy</button>
      </div>
      <p id="scrape-status" class="status" hidden></p>
      <pre id="scrape-json" class="json" hidden></pre>
    </section>

    <section class="card">
      <h2 class="card__title">Your Profile</h2>
      <div id="profile-root"></div>
    </section>

    <section class="card">
      <h2 class="card__title">Backend</h2>
      <div id="health" class="health">
        <span class="badge badge--neutral">Unknown</span>
      </div>
      <label class="field">
        <span class="field__label">Backend URL</span>
        <input id="backend-url" class="input" type="text" placeholder="http://localhost:8003" />
      </label>
      <button id="check-health" class="btn btn--secondary">Check connection</button>
    </section>

    <section class="card">
      <h2 class="card__title">Job Analysis</h2>
      <p id="analysis-status" class="status" hidden></p>
      <button id="analyse-job" class="btn">Analyse this page</button>
      <pre id="analysis-json" class="json" hidden></pre>
    </section>

    <footer class="footer">
      Phase 2 — auto-scrape page text.
    </footer>

    <script src="sidepanel.js"></script>
    <script type="module" src="profile/index.js"></script>
  </body>
</html>
